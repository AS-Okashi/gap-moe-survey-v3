<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ギャップ萌えアンケート</title>
<style>body{font-family:sans-serif;background:#111;color:#eee;max-width:1200px;margin:auto;padding:20px}.original{text-align:center}.original img{max-width:500px;width:100%;border:3px solid #A78BFA;border-radius:12px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px}.card{border:2px solid #555;padding:8px;border-radius:10px;cursor:pointer}.card.selected{border-color:#F472B6}.card img{width:100%;aspect-ratio:3/4;object-fit:cover}button{margin:30px auto;display:block;padding:12px 24px}</style></head><body><h1>ギャップ萌えアンケート</h1><div class="original"><h2>元画像</h2><img src="images/original.png" onerror="this.src='images/input1.png'"></div><h2>最もギャップ萌えを感じた画像を選択してください</h2><div class="grid"><div class='card' data='color'><img src='images/color.png' onerror="this.src='images/input1.png'"><p>色</p></div><div class='card' data='pattern'><img src='images/pattern.png' onerror="this.src='images/input1.png'"><p>柄</p></div><div class='card' data='material'><img src='images/material.png' onerror="this.src='images/input1.png'"><p>素材</p></div><div class='card' data='silhouette'><img src='images/silhouette.png' onerror="this.src='images/input1.png'"><p>シルエット</p></div><div class='card' data='exposure'><img src='images/exposure.png' onerror="this.src='images/input1.png'"><p>露出度</p></div><div class='card' data='season'><img src='images/season.png' onerror="this.src='images/input1.png'"><p>季節感</p></div><div class='card' data='accessory'><img src='images/accessory.png' onerror="this.src='images/input1.png'"><p>装飾</p></div></div><button>回答を送信</button><script>document.querySelectorAll(".card").forEach(c=>c.onclick=()=>{document.querySelectorAll(".card").forEach(x=>x.classList.remove("selected"));c.classList.add("selected");});</script></body></html>
